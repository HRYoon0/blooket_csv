<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  :root { --blooket: #0bc2cf; --hover: #09a8b4; --border: #e2e8f0; --text: #1e293b; --muted: #64748b; --danger: #ef4444; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 460px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); line-height: 1.5; }
  .wrap { padding: 16px; }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  header h1 { font-size: 16px; font-weight: 700; color: var(--blooket); }
  .open-full { font-size: 12px; color: var(--blooket); text-decoration: none; cursor: pointer; padding: 4px 10px; border: 1px solid var(--blooket); border-radius: 6px; transition: all 0.2s; background: none; font-weight: 600; }
  .open-full:hover { background: var(--blooket); color: white; }
  .tip { font-size: 12px; color: var(--muted); margin-bottom: 8px; } .tip strong { color: var(--blooket); }

  textarea { width: 100%; height: 180px; border: 2px solid var(--border); border-radius: 8px; padding: 10px; font-size: 13px; font-family: monospace; line-height: 1.6; resize: none; color: var(--text); }
  textarea:focus { outline: none; border-color: var(--blooket); }
  textarea::placeholder { color: #94a3b8; font-size: 12px; }

  .settings { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 13px; }
  .settings label { font-weight: 600; white-space: nowrap; }
  .settings input[type="number"] { width: 60px; padding: 4px 6px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; text-align: center; }
  .settings input[type="number"]:focus { outline: none; border-color: var(--blooket); }
  .settings .hint { color: var(--muted); font-size: 11px; }

  .actions { display: flex; gap: 8px; margin-top: 10px; }
  button { flex: 1; padding: 8px 0; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-parse { background: var(--blooket); color: white; } .btn-parse:hover { background: var(--hover); }
  .btn-csv { background: #f1f5f9; color: var(--text); border: 1px solid var(--border); } .btn-csv:hover { border-color: var(--blooket); color: var(--blooket); }
  .btn-csv:disabled { opacity: 0.4; cursor: default; }

  .result { margin-top: 10px; padding: 10px 12px; background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; display: none; }
  .result .stats { display: flex; gap: 14px; flex-wrap: wrap; }
  .result .stat strong { color: var(--blooket); margin-right: 2px; }
  .result .stat.warn strong { color: var(--danger); }
  .result .preview { margin-top: 8px; max-height: 140px; overflow-y: auto; font-size: 12px; color: var(--muted); }
  .result .preview .q-item { padding: 3px 0; border-bottom: 1px solid #eee; }
  .result .preview .q-num { color: var(--blooket); font-weight: 700; margin-right: 4px; }
  .result .preview .q-type { font-size: 10px; padding: 1px 5px; border-radius: 4px; margin-left: 4px; }
  .result .preview .type-choice { background: #e0f7fa; color: #006064; }
  .result .preview .type-short { background: #fef3c7; color: #92400e; }

  .toast { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%) translateY(60px); background: #1e293b; color: white; padding: 8px 16px; border-radius: 6px; font-size: 12px; opacity: 0; transition: all 0.3s; z-index: 100; } .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Quiz to Blooket CSV</h1>
    <button class="open-full" id="btnOpenFull">상세 편집 열기</button>
  </header>
  <p class="tip">LLM에게 문제를 요청할 때 <strong>정답도 함께 출력</strong>해달라고 하세요. (예: "정답: ③")</p>

  <textarea id="inputText" placeholder="LLM이 생성한 문제를 붙여넣으세요.

예시:
1. I am _______ Vietnam.
① to  ② in  ③ at  ④ from
정답: ④ from"></textarea>

  <div class="settings">
    <label>시간:</label>
    <input type="number" id="defaultTime" value="20" min="5" max="300" step="5">
    <span class="hint">초</span>
  </div>

  <div class="actions">
    <button class="btn-parse" id="btnParse">파싱하기</button>
    <button class="btn-csv" id="btnCSV" disabled>CSV 다운로드</button>
  </div>

  <div class="result" id="result">
    <div class="stats" id="stats"></div>
    <div class="preview" id="preview"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="app.js"></script>
<script src="popup.js"></script>
</body>
</html>
